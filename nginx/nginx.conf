worker_processes 1;
daemon off;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /workspace/vocab_project_populated/nginx/access.log;
    error_log /workspace/vocab_project_populated/nginx/error.log;

    sendfile on;
    keepalive_timeout 65;

    # Include the site-specific configuration
    include /workspace/vocab_project_populated/nginx.conf;
}
